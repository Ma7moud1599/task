name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install 2>/dev/null || echo "No package.json, skipping"

      - name: Check for syntax errors
        run: |
          find . -name "*.js" ! -path "*/node_modules/*" | while read f; do
            node --check "$f" && echo "✓ $f" || echo "✗ $f"
          done
